name: GenerateRelease

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    env:
      SOLUTION_NAME: Avalonia.One.sln
      WAP_PROJECT_PATH: One.Toolbox.Desktop/One.Toolbox.Desktop.csproj
      WAP_PROJECT_DIRECTORY: output
      CONFIGURATION: Release
      ARCHIVE_BASE: One.Toolbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore & Publish (create AppPackages)
        shell: pwsh
        run: |
          Write-Host "Solution: $env:SOLUTION_NAME"
          $packageDir = Join-Path $env:WAP_PROJECT_DIRECTORY 'AppPackages'
          dotnet restore $env:SOLUTION_NAME
          dotnet publish $env:WAP_PROJECT_PATH -c $env:CONFIGURATION --output $packageDir /p:AppxBundle=Always /p:AppxBundlePlatforms=x86|x64 /p:AppxPackageBuildMode=StoreUpload

      - name: List AppPackages (debug)
        shell: pwsh
        run: |
          $packageDir = Join-Path $env:WAP_PROJECT_DIRECTORY 'AppPackages'
          if (Test-Path $packageDir) {
            Get-ChildItem -Path $packageDir -Recurse | Select-Object FullName, Length
          } else {
            Write-Host "AppPackages directory not found: $packageDir"
            exit 1
          }

      - name: Zip AppPackages
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $packageDir = Join-Path $env:WAP_PROJECT_DIRECTORY 'AppPackages'
          $zipName = '{0}_{1}.zip' -f $env:ARCHIVE_BASE, $env:REF_NAME
          $zipPath = Join-Path (Resolve-Path .).Path $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $packageDir '*') -DestinationPath $zipPath -Force
          Write-Host "Created zip: $zipPath"

      - name: Upload artifact (Actions)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_BASE }}_${{ github.ref_name }}
          path: ${{ env.ARCHIVE_BASE }}_${{ github.ref_name }}.zip

      - name: Get previous tag
        id: prev-tag
        shell: bash
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || true)
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release-notes
        shell: bash
        run: |
          if [ -z "${{ steps.prev-tag.outputs.prev_tag }}" ]; then
            RELEASE_LOG=$(git log --pretty=format:"- %s (%h)" --reverse HEAD)
          else
            RELEASE_LOG=$(git log "${{ steps.prev-tag.outputs.prev_tag }}..HEAD" --pretty=format:"- %s (%h)" --reverse)
          fi
          echo "## Release ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md
          echo "Changes:" >> release_notes.md
          echo "" >> release_notes.md
          echo "$RELEASE_LOG" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            release_notes.md
            ${{ env.ARCHIVE_BASE }}_${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
